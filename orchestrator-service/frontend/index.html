<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Orchestrator — настройка БД</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>AI Orchestrator</h1>
        <p class="sub">Подключение к базе данных оркестратора</p>
      </header>

      <section class="card">
        <h2>Параметры подключения</h2>

        <label>Строка подключения (необязательно)
          <input id="url" type="text" placeholder="postgresql://postgres:postgres@127.0.0.1:5432/orchestrator_db" />
          <small>Заполните — и поля ниже подставятся автоматически.</small>
        </label>

        <div class="grid">
          <label>Хост / путь
            <input id="host" type="text" placeholder="127.0.0.1" />
          </label>
          <label>Порт
            <input id="port" type="number" placeholder="5432" />
          </label>
          <label>База данных
            <input id="database" type="text" placeholder="orchestrator_db" />
          </label>
          <label>Служебная БД (для CREATE DATABASE)
            <input id="adminDatabase" type="text" placeholder="postgres" />
          </label>
          <label>Логин
            <input id="user" type="text" placeholder="postgres" autocomplete="username" />
          </label>
          <label>Пароль
            <input id="password" type="password" placeholder="••••••" autocomplete="current-password" />
          </label>
        </div>

        <div class="actions">
          <button id="btnTest" class="ghost">Проверить подключение</button>
          <button id="btnSave" class="ghost">Сохранить</button>
          <button id="btnInit" class="primary">Создать БД и миграции</button>
          <button id="btnSeed" class="ghost">Загрузить примеры</button>
        </div>

        <pre id="out" class="out" hidden></pre>
      </section>

      <section class="card">
        <div class="status-head">
          <h2>Состояние базы</h2>
          <button id="btnRefresh" class="ghost small">Обновить</button>
        </div>
        <div id="status" class="status">—</div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
