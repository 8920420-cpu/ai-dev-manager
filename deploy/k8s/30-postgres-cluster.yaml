# Кластер Postgres (шаг 6): 3 инстанса — по одному на каждую ноду
# (anti-affinity required). Primary принимает запись, две streaming-реплики
# получают WAL по внутренней сети (flannel поверх LAN); failover автоматический.
# CNPG сам создаёт Secret `pg-main-app` (логин/пароль владельца БД) и сервисы:
#   pg-main-rw — всегда primary (запись), pg-main-ro — реплики (чтение).
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-main
  namespace: ai-prod
spec:
  instances: 3

  bootstrap:
    initdb:
      database: orchestrator_db
      owner: orchestrator

  storage:
    # local-path — штатный StorageClass k3s (диск ноды). Данные не переезжают
    # между нодами — их консистентность обеспечивает репликация CNPG.
    storageClass: local-path
    size: 20Gi

  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    podAntiAffinityType: required

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "512MB"
    # Ноды кластера стоят на РАЗНЫХ площадках (site-to-site WireGuard), поэтому
    # репликация асинхронная: синхронная добавляла бы RTT интернет-канала к
    # КАЖДОМУ коммиту. Если каналы быстрые (<10мс) и нужен нулевой RPO —
    # раскомментировать:
    # synchronous:
    #   method: any
    #   number: 1
