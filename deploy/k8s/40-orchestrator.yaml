# Оркестратор: backend + собранный в образ фронтенд (см. orchestrator-service/Dockerfile).
# replicas: 1 — внутри процесса живёт runner (feeder/scanner-мост); работа
# нескольких экземпляров одновременно не проверялась (клеймы в БД скорее всего
# выдержат, но дубли фоновых жнецов не тестировались). Масштабировать только
# после проверки.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-service
  namespace: ai-prod
  labels:
    app: orchestrator-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator-service
  template:
    metadata:
      labels:
        app: orchestrator-service
    spec:
      containers:
        - name: orchestrator-service
          image: orchestrator-service:latest
          ports:
            - containerPort: 80
          env:
            - name: PGHOST
              value: pg-main-rw
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: pg-main-app
                  key: username
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-main-app
                  key: password
            - name: PGDATABASE
              value: orchestrator_db
            - name: AUTO_INIT
              value: "true"
            - name: RUNNER_ENABLED
              value: "true"
            - name: RUNNER_INTERVAL_MS
              value: "3000"
            - name: RUNNER_ROLE_TIMEOUT_MS
              value: "600000"
            - name: RUNNER_CLAUDE_TIMEOUT_MS
              value: "1500000"
            - name: RUNNER_HOST_TIMEOUT_MS
              value: "2400000"
            - name: TOOLS_SERVICE_URL
              value: http://tools-service:4188
            - name: ORCHESTRATOR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: apiToken
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-service
  namespace: ai-prod
spec:
  selector:
    app: orchestrator-service
  ports:
    - port: 80
      targetPort: 80
