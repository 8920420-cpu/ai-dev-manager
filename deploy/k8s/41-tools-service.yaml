# Сервис инструментов (builtin-чтение/запись файлов проектов).
# В докере он монтирует каталоги проектов с хоста; в кластере то же самое
# делает hostPath /srv/projects — каталог должен существовать на нодах
# (создаётся при провижининге или руками). Наружу через Ingress НЕ публикуется:
# /execute умеет писать и удалять файлы.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tools-service
  namespace: ai-prod
  labels:
    app: tools-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tools-service
  template:
    metadata:
      labels:
        app: tools-service
    spec:
      containers:
        - name: tools-service
          image: tools-service:latest
          ports:
            - containerPort: 4188
          env:
            - name: TOOLS_SERVICE_PORT
              value: "4188"
            - name: TOOLS_ALLOWED_ROOTS
              value: /projects
            - name: ORCHESTRATOR_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: apiToken
          volumeMounts:
            - name: projects
              mountPath: /projects
          readinessProbe:
            httpGet:
              path: /health
              port: 4188
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: projects
          hostPath:
            path: /srv/projects
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: tools-service
  namespace: ai-prod
spec:
  selector:
    app: tools-service
  ports:
    - port: 4188
      targetPort: 4188
