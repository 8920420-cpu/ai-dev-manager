# Свой nginx на КАЖДОЙ ноде: ingress-nginx как DaemonSet с hostPort 80/443.
# Cloudflare шлёт трафик на белый IP любой ноды — локальный nginx этой ноды
# маршрутизирует запрос по Ingress-правилам к микросервисам.
# Устанавливается helm-контроллером, встроенным в k3s (traefik отключён
# в provision-k3s.sh флагом --disable traefik).
apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: ingress-nginx
  namespace: kube-system
spec:
  repo: https://kubernetes.github.io/ingress-nginx
  chart: ingress-nginx
  targetNamespace: ingress-nginx
  createNamespace: true
  valuesContent: |-
    controller:
      kind: DaemonSet
      hostPort:
        enabled: true
        ports:
          http: 80
          https: 443
      service:
        enabled: false
      publishService:
        enabled: false
      ingressClassResource:
        default: true
      config:
        # За Cloudflare: доверяем заголовкам проксирования.
        use-forwarded-headers: "true"
        # Реальный IP клиента от Cloudflare (раскомментировать и поддерживать
        # список сетей CF: https://www.cloudflare.com/ips/):
        # forwarded-for-header: "CF-Connecting-IP"
        # proxy-real-ip-cidr: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"
