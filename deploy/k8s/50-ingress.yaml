# Маршрутизация по доменам: nginx на каждой ноде (см. 10-ingress-nginx.yaml)
# принимает трафик от Cloudflare на 80/443 и ведёт по этим правилам.
# Домены-заглушки замените на реальные (в Cloudflare — проксируемые записи
# на белые IP всех трёх нод). TLS-секрет — сертификат Cloudflare Origin CA:
#   kubectl -n ai-prod create secret tls origin-ca-tls --cert=origin.pem --key=origin-key.pem
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-prod
  namespace: ai-prod
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: 32m
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - orchestrator.example.com
      secretName: origin-ca-tls
  rules:
    - host: orchestrator.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-service
                port:
                  number: 80
    # mcp-service открывать только с непустым ORCHESTRATOR_API_TOKEN:
    # - host: mcp.example.com
    #   http:
    #     paths:
    #       - path: /
    #         pathType: Prefix
    #         backend:
    #           service:
    #             name: mcp-service
    #             port:
    #               number: 4190
