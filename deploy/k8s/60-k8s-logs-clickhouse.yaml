# LOGGING-STANDARD-001 — сбор логов контейнеров k8s в ClickHouse (k8s.container_logs),
# откуда MATERIALIZED VIEW разбирает JSON-строки в структурную k8s.app_logs
# (deploy/clickhouse/k8s-logs/001_app_logs.sql).
#
# Что делает конфиг сверх «сырого tail»:
#   • multiline.parser cri  — склеивает разорванные CRI-строки и многострочные
#     стектрейсы в одно событие;
#   • Downward API NODE_NAME → поле `node` (запрос «ошибки по pod и node»);
#   • kubernetes-фильтр → метки пода; Lua кодирует их в JSON `k8s_labels`
#     (CH-колонка), из которой MV делает Map `labels`; вложенный `kubernetes` не шлём;
#   • grep-исключения — свой namespace `logging` и probe-шум не пишем;
#   • Lua enrich.lua — node, дроп probe-шума, маскирование секретов в сырой строке.
apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
# RBAC для kubernetes-фильтра (чтение метаданных подов/неймспейсов).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fluent-bit-read
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fluent-bit-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: fluent-bit-read
subjects:
  - kind: ServiceAccount
    name: fluent-bit
    namespace: logging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: logging
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush                     5
        Daemon                    Off
        Log_Level                 info
        Parsers_File              parsers.conf
        storage.metrics           On

    [INPUT]
        Name                      tail
        Path                      /var/log/containers/*.log
        multiline.parser          cri
        Tag                       kube.*
        Path_Key                  file
        Mem_Buf_Limit             32MB
        Skip_Long_Lines           On
        Refresh_Interval          10
        DB                        /buffers/flb_kube.db

    # Не собираем логи самого стека логирования (fluent-bit) — иначе цикл/шум.
    [FILTER]
        Name                      grep
        Match                     kube.*
        Exclude                   file _logging_

    # Метаданные пода (метки). Merge_Log Off — `log` остаётся сырым (JSON парсит CH).
    [FILTER]
        Name                      kubernetes
        Match                     kube.*
        Kube_Tag_Prefix           kube.var.log.containers.
        Merge_Log                 Off
        Keep_Log                  On
        Labels                    On
        Annotations               Off
        Buffer_Size               512k

    # node из Downward API + метки → k8s_labels + drop probe + маскирование секретов.
    [FILTER]
        Name                      lua
        Match                     kube.*
        script                    enrich.lua
        call                      process

    [OUTPUT]
        Name                      http
        Match                     kube.*
        Host                      192.168.1.211
        Port                      8123
        URI                       /?query=INSERT%20INTO%20k8s.container_logs%20FORMAT%20JSONEachRow&input_format_skip_unknown_fields=1&async_insert=1&wait_for_async_insert=0
        Format                    json_lines
        Json_date_key             ts
        Json_date_format          iso8601
        Header                    Content-Type application/json
        Retry_Limit               5
        net.keepalive             on

  parsers.conf: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

  enrich.lua: |
    -- Минимальный JSON-энкодер плоской таблицы меток (Lua 5.1/LuaJIT, без cjson).
    local function esc(s)
        s = string.gsub(tostring(s), "\\", "\\\\")
        s = string.gsub(s, '"', '\\"')
        return s
    end
    local function encode_labels(t)
        if type(t) ~= "table" then return "" end
        local parts, n = {}, 0
        for k, v in pairs(t) do
            n = n + 1
            parts[n] = '"' .. esc(k) .. '":"' .. esc(v) .. '"'
        end
        if n == 0 then return "" end
        return "{" .. table.concat(parts, ",") .. "}"
    end

    function process(tag, ts, record)
        -- node: Downward API (надёжно), fallback — kubernetes.host.
        local node = os.getenv("NODE_NAME")
        local kube = record["kubernetes"]
        if (node == nil or node == "") and kube ~= nil then node = kube["host"] end
        if node ~= nil and node ~= "" then record["node"] = node end

        -- Метки пода → JSON-строка k8s_labels; вложенный kubernetes не шлём в CH.
        if kube ~= nil then
            record["k8s_labels"] = encode_labels(kube["labels"])
            record["kubernetes"] = nil
        end

        local log = record["log"]
        if log == nil then return 2, ts, record end

        -- Шум k8s probe / kubelet health — не пишем.
        if string.find(log, "kube-probe", 1, true) then return -1, ts, record end

        -- Маскирование секретов в сырой строке (предохранитель, §9 стандарта).
        log = string.gsub(log, "([Bb]earer%s+)[%w%._%-]+", "%1[REDACTED]")
        log = string.gsub(log, "([Aa]uthorization\"?%s*[:=]%s*\"?)[^\"%s,}]+", "%1[REDACTED]")
        log = string.gsub(log, "(password\"?%s*[:=]%s*\"?)[^\"%s,}]+", "%1[REDACTED]")
        log = string.gsub(log, "(refresh_token\"?%s*[:=]%s*\"?)[^\"%s,}]+", "%1[REDACTED]")
        log = string.gsub(log, "(access_token\"?%s*[:=]%s*\"?)[^\"%s,}]+", "%1[REDACTED]")
        log = string.gsub(log, "(postgres[%w]*://[^:]+:)[^@]+(@)", "%1[REDACTED]%2")
        record["log"] = log

        return 2, ts, record
    end
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit-clickhouse
  namespace: logging
  labels:
    app.kubernetes.io/name: fluent-bit-clickhouse
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: fluent-bit-clickhouse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fluent-bit-clickhouse
    spec:
      serviceAccountName: fluent-bit
      tolerations:
        - operator: Exists
      containers:
        - name: fluent-bit
          image: 192.168.1.211:5000/fluent-bit:3.2.10
          imagePullPolicy: IfNotPresent
          env:
            # Downward API: имя ноды, на которой крутится этот под DaemonSet.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/fluent-bit.conf
              subPath: fluent-bit.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/parsers.conf
              subPath: parsers.conf
              readOnly: true
            - name: config
              mountPath: /fluent-bit/etc/enrich.lua
              subPath: enrich.lua
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: buffers
              mountPath: /buffers
      volumes:
        - name: config
          configMap:
            name: fluent-bit-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: buffers
          hostPath:
            path: /var/lib/fluent-bit-clickhouse
            type: DirectoryOrCreate
