# Инвентарь роутеров (адреса — те же, что в ../oxidized/router.db) и серверов.
routers:
  hosts:
    kaskad:                     # Keenetic, площадка «Каскад» (Воронеж)
      ansible_host: kaskadvrn.keenetic.link
      ansible_user: Semaphore
      # Keenetic (NDMS) не поддерживается ansible network_cli — управление:
      # ping/port-чек (check-alive.yml), raw-команды по SSH или REST-API (RCI).
      ansible_connection: local
      mgmt_port: 22   # SSH; наружу открыт только с наших IP (ACL _MARSHRUTKA_ISP3 на роутере)
    giga-lan:                   # Keenetic Giga (KN-1012), шлюз локальной сети
      ansible_host: 192.168.1.1
      ansible_user: Semaphore
      ansible_connection: local
      mgmt_port: 22   # SSH (security-level private — только LAN); telnet 23 оставлен как запасной
    psvrn:                      # Keenetic Voyager Pro (KN-3510), площадка ПС (Воронеж)
      ansible_host: psvrn.keenetic.link
      ansible_user: semaphore
      ansible_connection: local
      mgmt_port: 22   # SSH; наружу открыт только с наших IP (ACL _MARSHRUTKA_ISP3 на роутере)
  vars: {}
    # Пароли НЕ хранить здесь — Semaphore Key Store или -e ansible_password=...
    # --- для MikroTik RouterOS ---
    # ansible_connection: ansible.netcommon.network_cli
    # ansible_network_os: community.routeros.routeros
    # --- для Cisco IOS ---
    # ansible_network_os: cisco.ios.ios

# Полноценные Linux-серверы: Ansible ходит на них нативно по SSH
# (ключ — в Semaphore Key Store, привязан к инвентарю).
servers:
  hosts:
    timeweb-vpn:                # VPS Timeweb Cloud (id 6276613), Ubuntu 24.04; на нём AmneziaWG (awg0 10.10.8.1/24)
      ansible_host: 72.56.73.96
      ansible_user: root
      mgmt_port: 22
  vars:
    ansible_python_interpreter: /usr/bin/python3
