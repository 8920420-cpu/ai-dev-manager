# Вотчдог бэкендов LB Timeweb (186.246.1.150): WAN Каскада/Барикадной — DHCP,
# при смене белого IP KeenDNS-имя обновляется, а бэкенд LB — нет. Скрипт
# files/lb_sync_backends.py приводит список бэкендов к актуальным адресам.
# Токен TIMEWEB_CLOUD_TOKEN приходит из Environment Semaphore («timeweb-cloud»).
---
- name: Синхронизация бэкендов балансировщика Timeweb с KeenDNS
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: lb_sync_backends.py
      ansible.builtin.command:
        cmd: python3 "{{ playbook_dir }}/../files/lb_sync_backends.py"
      register: lb_sync
      changed_when: "'CHANGED' in lb_sync.stdout"
      environment:
        TIMEWEB_CLOUD_TOKEN: "{{ lookup('ansible.builtin.env', 'TIMEWEB_CLOUD_TOKEN') }}"

    - name: Результат
      ansible.builtin.debug:
        var: lb_sync.stdout_lines
