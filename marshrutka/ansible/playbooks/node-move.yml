# Переезд ноды k3s между площадками: одна кнопка вместо ручных шагов.
# Меняет ТОЛЬКО ip host <нода>.ps.lan на всех трёх Keenetic — «слот» ноды
# (x.x.x.157), DNAT 30080/30443 на слот и DHCP-резервация MAC ноды уже
# прописаны на каждом роутере постоянно (см. docs/RUNBOOK_AI_AND_HOST.md).
# Бэкенды LB Timeweb чинит вотчдог lb-sync-backends (шаблон id=5).
# Запуск: survey-переменная node_site = base | kaskad | ps.
# Пароли роутеров — environment «keenetic-routers»: RPASS_<ХОСТ_ИНВЕНТАРЯ>.
---
- name: Переезд ноды k3s — ip host на всех роутерах
  hosts: routers
  gather_facts: false
  vars:
    node_name: k3s-1
    node_slots:
      base: 192.168.1.157
      kaskad: 192.168.2.157
      ps: 192.168.3.157
    slot_ip: "{{ node_slots[node_site] }}"
    rpass_var: "RPASS_{{ inventory_hostname | upper | replace('-', '_') }}"
  tasks:
    - name: Валидация node_site
      ansible.builtin.assert:
        that:
          - node_site is defined
          - node_site in node_slots
        fail_msg: "node_site должен быть одним из: base, kaskad, ps"
      run_once: true
      delegate_to: localhost

    - name: paramiko для keenetic_shell.py (в venv Semaphore, после recreate контейнера ставится заново)
      ansible.builtin.command:
        cmd: python3 -m pip install --quiet paramiko
      run_once: true
      delegate_to: localhost
      changed_when: false

    - name: "{{ inventory_hostname }}: ip host {{ node_name }}.ps.lan → {{ slot_ip }}"
      ansible.builtin.command:
        argv:
          - python3
          - "{{ playbook_dir }}/../files/keenetic_shell.py"
          - "{{ ansible_host }}"
          - "{{ ansible_user }}"
          - "{{ rpass_var }}"
          - "-no ip host {{ node_name }}.ps.lan"
          - "ip host {{ node_name }}.ps.lan {{ slot_ip }}"
          - "system configuration save"
      register: keenetic_out
      changed_when: true

    - name: Ответ роутера
      ansible.builtin.debug:
        var: keenetic_out.stdout_lines
