---
# Базовый харденинг Linux-серверов группы `servers` (первый: timeweb-vpn).
# Идемпотентен: применён вручную 08.07.2026, плейбук — кодификация для повторов
# и новых серверов. НИЧЕГО не делает с FORWARD/NAT — туннель AmneziaWG живёт
# своими PostUp-правилами, ufw ставится с DEFAULT_FORWARD_POLICY=ACCEPT.
# Только штатные модули ansible.builtin — без community.general (ufw через команды).
- name: Харденинг Linux-серверов
  hosts: servers
  gather_facts: false
  vars:
    swap_file: /swapfile
    swap_size_mb: 1024
    # Zabbix-серверы мониторинга Timeweb (Server= в /etc/zabbix/zabbix_agentd.conf)
    zabbix_allowed:
      - 92.53.116.12
      - 92.53.116.111
      - 92.53.116.119
  tasks:
    # --- swap ---
    - name: Swap-файл существует
      ansible.builtin.command: fallocate -l {{ swap_size_mb }}M {{ swap_file }}
      args:
        creates: "{{ swap_file }}"
      register: swap_created

    - name: Swap-файл размечен и включён
      ansible.builtin.shell: |
        chmod 600 {{ swap_file }} && mkswap {{ swap_file }} && swapon {{ swap_file }}
      when: swap_created is changed

    - name: Swap в fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        line: "{{ swap_file }} none swap sw 0 0"
        regexp: "^{{ swap_file }} "

    - name: vm.swappiness=10
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-swappiness.conf
        content: "vm.swappiness=10\n"
        mode: "0644"
      notify: apply sysctl

    # --- sshd: только ключи ---
    # Имя файла ДОЛЖНО сортироваться раньше 50-cloud-init.conf: у sshd
    # выигрывает первое встреченное значение параметра.
    - name: sshd — ключи-only (40-hardening.conf)
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/40-hardening.conf
        content: |
          PermitRootLogin prohibit-password
          PasswordAuthentication no
          X11Forwarding no
          MaxAuthTries 4
        mode: "0644"
        validate: sshd -t -f /etc/ssh/sshd_config
      notify: reload sshd

    # --- ufw: только INPUT, форвардинг НЕ трогаем ---
    - name: ufw установлен
      ansible.builtin.apt:
        name: ufw
        state: present
        update_cache: false

    - name: ufw — FORWARD policy ACCEPT (не резать транзит VPN)
      ansible.builtin.lineinfile:
        path: /etc/default/ufw
        regexp: "^DEFAULT_FORWARD_POLICY="
        line: 'DEFAULT_FORWARD_POLICY="ACCEPT"'
      register: ufw_fwd_policy

    - name: ufw — правила (idempotent, ufw сам не дублирует)
      ansible.builtin.command: "{{ item }}"
      loop:
        - ufw allow 22/tcp comment SSH
        - ufw allow 42666/udp comment AmneziaWG
        # 80/30080 — nginx-прокси до k3s ingress, вход с балансировщика Timeweb 85.198.81.20
        - ufw allow 80/tcp comment LB-k3s-ingress
        - ufw allow 30080/tcp comment LB-k3s-ingress
      register: ufw_rules
      changed_when: "'Skipping' not in ufw_rules.stdout"

    - name: ufw — Zabbix 10050 только с мониторинга Timeweb
      ansible.builtin.command: ufw allow proto tcp from {{ item }} to any port 10050 comment Zabbix
      loop: "{{ zabbix_allowed }}"
      register: ufw_zbx
      changed_when: "'Skipping' not in ufw_zbx.stdout"

    - name: ufw включён
      ansible.builtin.shell: |
        ufw status | grep -q "Status: active" || ufw --force enable
      register: ufw_enable
      changed_when: "'active (running)' in ufw_enable.stdout or 'enabled' in ufw_enable.stdout"

    - name: ufw перечитал policy после смены DEFAULT_FORWARD_POLICY
      ansible.builtin.command: ufw reload
      when: ufw_fwd_policy is changed

    # --- fail2ban ---
    - name: fail2ban установлен
      ansible.builtin.apt:
        name: fail2ban
        state: present
        update_cache: false

    - name: fail2ban — jail sshd через journald (auth.log на minimal-образах нет)
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          backend = systemd
          [sshd]
          enabled = true
          maxretry = 4
          bantime = 1h
        mode: "0644"
      notify: restart fail2ban

    - name: fail2ban запущен и в автостарте
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: true

    # --- unattended-upgrades (security-патчи сами) ---
    - name: unattended-upgrades активен
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: started
        enabled: true

    # --- бэкап конфига AmneziaWG (если он есть на хосте) ---
    - name: awg0.conf присутствует?
      ansible.builtin.stat:
        path: /etc/amnezia/amneziawg/awg0.conf
      register: awg_conf

    - name: awg0.conf не читается группой/остальными
      ansible.builtin.file:
        path: /etc/amnezia/amneziawg/awg0.conf
        mode: "0600"
      when: awg_conf.stat.exists

    # Ключи! /ansible/backups в .gitignore (проверить при добавлении новых хостов).
    - name: Бэкап awg0.conf на контрол-ноду
      ansible.builtin.fetch:
        src: /etc/amnezia/amneziawg/awg0.conf
        dest: "{{ playbook_dir }}/../backups/{{ inventory_hostname }}/"
        flat: true
      when: awg_conf.stat.exists

    # --- финальная проверка: туннель жив ---
    - name: Свежесть последнего хендшейка AWG (если туннель есть)
      ansible.builtin.shell: |
        awg show awg0 latest-handshakes | awk '{print $2}' | sort -rn | head -1 \
          | xargs -I{} sh -c 'echo $(( $(date +%s) - {} ))'
      register: awg_hs
      changed_when: false
      failed_when: awg_conf.stat.exists and (awg_hs.stdout | int) > 600
      when: awg_conf.stat.exists

    - name: Итог по туннелю
      ansible.builtin.debug:
        msg: "AWG: последний handshake {{ awg_hs.stdout }} c назад"
      when: awg_conf.stat.exists

  handlers:
    - name: apply sysctl
      ansible.builtin.command: sysctl -p /etc/sysctl.d/99-swappiness.conf

    - name: reload sshd
      ansible.builtin.systemd:
        name: ssh
        state: reloaded

    - name: restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted
