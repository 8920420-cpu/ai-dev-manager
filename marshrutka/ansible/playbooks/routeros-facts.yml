---
# Пример для MikroTik RouterOS: снять сводку по железу и версии.
# Требует community.routeros (см. requirements.yml) и ansible_password.
- name: Факты RouterOS
  hosts: routers
  gather_facts: false
  tasks:
    - name: Системная сводка
      community.routeros.command:
        commands:
          - /system resource print
          - /system identity print
      register: out

    - name: Показать
      ansible.builtin.debug:
        var: out.stdout_lines
