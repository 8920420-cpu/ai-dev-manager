# prioritetstroy.рф ДЕКОММИШН на nginx-146 (сайт переехал в k3s через Timeweb LB, 08.07.2026).
# Живой конфиг обновлён 14.07.2026: снят geo-403 ($allow_access) и прокси на старый
# docker (211:1040) — они давали split-brain (стухший DNS 195.98.86.63 → чужая сборка + 403).
# Теперь любой клиент, всё ещё попадающий на 195.98.86.63, редиректится на канонический HTTPS.
# Остальные vhost'ы (ps-smeta / ps-razrabotchik / ps-chat) на этой ВМ НЕ трогались.
# Бэкап прежней версии на ВМ: /root/prioritetstroy.conf.bak-2026-07-14-*.

server {
    server_name     xn--e1afafwccicckkbb.xn--p1ai www.xn--e1afafwccicckkbb.xn--p1ai;
    listen 80;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }
    location / {
        return 301 https://xn--e1afafwccicckkbb.xn--p1ai$request_uri;
    }
}

server {
    server_name     xn--e1afafwccicckkbb.xn--p1ai www.xn--e1afafwccicckkbb.xn--p1ai;
    listen          443 ssl;

    ssl_certificate /etc/letsencrypt/live/xn--e1afafwccicckkbb.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--e1afafwccicckkbb.xn--p1ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location / {
        return 301 https://xn--e1afafwccicckkbb.xn--p1ai$request_uri;
    }
}
