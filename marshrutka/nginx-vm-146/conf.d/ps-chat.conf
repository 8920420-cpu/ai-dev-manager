server {
    server_name     xn----8sb7bih2a.xn--p1ai www.xn----8sb7bih2a.xn--p1ai;
    listen 80;

    location / {
        return 301 https://$host$request_uri;
    }
    
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }
}

server {
    server_name     xn----8sb7bih2a.xn--p1ai www.xn----8sb7bih2a.xn--p1ai;
    listen          443 ssl;

    ssl_certificate /etc/letsencrypt/live/xn----8sb7bih2a.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn----8sb7bih2a.xn--p1ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/xn----8sb7bih2a.xn--p1ai/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #add_header X-Frame-Options DENY always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    resolver 8.8.8.8;

    # Главная страница
    location / {
	# Если локальный IP или разрешённая страна — пропускаем
	if ($allow_access = 0) {
	    return 403;
	}

	proxy_pass  http://192.168.1.211:1034;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
	proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_redirect off;
	proxy_buffering off;
	proxy_request_buffering off;

    }

    location /avito/ {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }
	proxy_pass http://192.168.1.211:8090;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_redirect off;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /register {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }
	proxy_pass http://192.168.1.211:1033; 
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_redirect off;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    location ^~ /assets/ {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }
	proxy_pass http://192.168.1.211:1033; 
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_redirect off;
        proxy_buffering off;
        proxy_request_buffering off;
    }
    
    location ^~ /api/v1/ {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }
	proxy_pass http://192.168.1.211:8099; 
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_redirect off;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location ^~ /max/webhook/ {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }
	proxy_pass http://192.168.1.211:5072;
	proxy_http_version 1.1;
	proxy_set_header Host $host;
	proxy_set_header X-Forwarded-Proto https;
	proxy_read_timeout 35s;                # MAX ждёт 200 в пределах 30 c
    }

    location ~* ^/(robots\.txt|robots_.*\.txt|robots_aspro\.php|sitemap(\.xml|\.php)|sitemap-iblock-.*\.xml|sitemap-files\.xml|turbo_yandex\.xml|images_sitemap.*\.xml|favicon\.svg)$ {
    	proxy_pass  http://192.168.1.211:1034;
    	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    	proxy_set_header Host $host;
    	proxy_set_header X-Forwarded-Port $server_port;
    	proxy_set_header X-Forwarded-Proto $scheme;
    	proxy_set_header X-Real-IP $remote_addr;
    	proxy_hide_header X-Powered-By;
    	proxy_hide_header Server;
    	proxy_redirect off;
	proxy_buffering off;
        proxy_request_buffering off;
    }


    # Логирование
    access_log /var/log/nginx/chat.access.log;
    error_log /var/log/nginx/chat.error.log;

    # Максимальный размер запроса
    client_max_body_size 100M;
}

