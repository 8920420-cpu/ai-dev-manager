server {
    server_name     xn----8sbo1anmbk.xn--p1ai www.xn----8sbo1anmbk.xn--p1ai;
    listen 80;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
}

server {
    server_name xn----8sbo1anmbk.xn--p1ai www.xn----8sbo1anmbk.xn--p1ai;
    listen 443 ssl;

    ssl_certificate /etc/letsencrypt/live/xn----8sbo1anmbk.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn----8sbo1anmbk.xn--p1ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/xn----8sbo1anmbk.xn--p1ai/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    resolver 8.8.8.8;

    # Главная страница
    location = / {
	# Если локальный IP или разрешённая страна — пропускаем
	if ($allow_access = 0) {
	    return 403;
	}

	limit_except GET POST { deny all; }

	#rewrite ^/$ /applications/PSSmeta/ break;
	#proxy_pass http://httpServer;
	proxy_pass http://httpServer/applications/PSSmeta/;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Host $host;
	proxy_set_header X-Forwarded-Port $server_port;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_hide_header X-Powered-By;
	proxy_hide_header Server;
	proxy_redirect off;
	#proxy_http_version 1.1;
	#proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Разрешённые пути
    location /auth/ {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }

	limit_except GET POST { deny all; }

	proxy_pass http://httpServer/auth/;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Host $host;
	proxy_set_header X-Forwarded-Port $server_port;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /sys/ {
        # Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }

        limit_except GET POST { deny all; }

        proxy_pass http://httpServer/sys/;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    location /applications/PSSmeta/ {
	# Если локальный IP или разрешённая страна — пропускаем
        if ($allow_access = 0) {
            return 403;
        }

	limit_except GET POST { deny all; }

	proxy_pass http://httpServer/applications/PSSmeta/;
	proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	proxy_set_header X-Forwarded-Host $host;
	proxy_set_header X-Forwarded-Port $server_port;
	proxy_set_header X-Forwarded-Proto $scheme;
	proxy_set_header X-Real-IP $remote_addr;
	proxy_hide_header X-Powered-By;
        proxy_hide_header Server;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Все остальные URL редиректим на главную
    location / {
	return 302 /;
    }

    # Защита скрытых файлов
    location ~ /\. {
	deny all;
    }

    access_log /var/log/nginx/ps-smeta.access.log;
    error_log /var/log/nginx/ps-smeta.error.log;

    # Максимальный размер запроса
    client_max_body_size 4G;

    large_client_header_buffers 4 256k;
}

--- RC=0 ---
