# iam.ps.lan — чистый LAN-адрес админки IAM КЛАСТЕРА (без порта :30080).
#
# Контекст: кластерный iam-admin (k3s ps-prod) отдаётся ingress'ом на хосте iam.ps.lan, но
# только через NodePort 30080 (LAN-вход в ingress — хаб 192.168.1.213:30080, см.
# `ip static tcp ISP 30080 → .213` на Keenetic). Чтобы адрес был чистым (http://iam.ps.lan/
# без :30080), этот server-блок на главном nginx .146 проксирует :80 → ingress кластера.
#
# СТАТУС: включено и работает — http://iam.ps.lan/ отдаёт админку (проверено 18.07.2026).
#   Файл лежит в /etc/nginx/conf.d/ на ВМ 192.168.1.146; на Keenetic задано
#   `ip host iam.ps.lan 192.168.1.146`. Прямой http://iam.ps.lan:30080/ больше НЕ работает —
#   имя резолвится в .146, а 30080 слушает только нода .213.
#   Блок аддитивный (свой server_name) — существующие vhost'ы (смета/разработчик) не затрагивает.
#
# Только LAN: зона ps.lan наружу не публикуется; TLS не нужен (внутренний доступ по http).
server {
    listen 80;
    server_name iam.ps.lan;

    location / {
        # Host сохраняем — ingress-nginx матчит правило iam-admin-lan именно по нему.
        proxy_pass http://192.168.1.213:30080;
        proxy_set_header Host iam.ps.lan;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
    }
}
