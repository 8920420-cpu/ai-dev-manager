# minio-console.ps.lan — чистый LAN-адрес Console распределённого MinIO (tenant ps-minio,
# ns minio-tenant в k3s ps-prod). По аналогии с iam-ps-lan.conf.
#
# Console отдаётся ingress'ом кластера по правилу minio-console (Host=minio-console.ps.lan),
# доступному по NodePort 30080 (LAN-вход в ingress — хаб 192.168.1.213:30080). Этот server-блок
# на главном nginx .146 проксирует :80 -> ingress, чтобы адрес был чистым (http://minio-console.ps.lan/).
#
# ВКЛЮЧЕНИЕ:
#   1) положить файл в /etc/nginx/conf.d/ на ВМ 192.168.1.146, `nginx -t && systemctl reload nginx`;
#   2) на Keenetic'ах: `ip host minio-console.ps.lan 192.168.1.146` (+ system configuration save).
# Только LAN: зона ps.lan наружу не публикуется; TLS не нужен.
server {
    listen 80;
    server_name minio-console.ps.lan;

    # Console аплоадит объекты через браузер — снимаем лимит тела.
    client_max_body_size 0;

    location / {
        proxy_pass http://192.168.1.213:30080;
        proxy_set_header Host minio-console.ps.lan;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        # Console использует websocket — пробрасываем upgrade.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
