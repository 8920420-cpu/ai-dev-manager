# ClusterIssuer Let's Encrypt для k3s (cert-manager v1.20.3, установлен 08.07.2026
# официальным манифестом). Выпуск по HTTP-01 через ingress-nginx: challenge приходит
# снаружи по цепочке LB 186.246.1.150:80 → 30080 → ingress — т.е. сертификат домена
# выпустится только КОГДА его DNS уже указывает на балансировщик. До перевода DNS
# Certificate висит в Pending с ретраями — это штатно.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: 8920420@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
