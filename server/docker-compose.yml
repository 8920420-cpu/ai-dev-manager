name: server

services:
  albia:
    build:
      context: ./albia
      dockerfile: Dockerfile
      args:
        ALBIA_BASE_IMAGE: "${ALBIA_IMAGE:-localhost:5000/albia:latest}"
    image: "${ALBIA_RUNTIME_IMAGE:-server-albia:latest}"
    container_name: albia
    environment:
      ALBIA_PORT: "${ALBIA_PORT:-8090}"
      ALBIA_PROVISION_USER: "${ALBIA_PROVISION_USER:-admin}"
      # albia_provision_ed25519 — БЕЗ пассфразы (admin_ed25519 зашифрован и
      # для неинтерактивного provisioning не годится).
      ALBIA_PROVISION_SSH_KEY: "${ALBIA_PROVISION_SSH_KEY:-/opt/albia/ssh/albia_provision_ed25519}"
      ALBIA_PROVISION_PXE_SERVER_IP: "${PXE_SERVER_IP:-192.168.1.130}"
    ports:
      - "${ALBIA_BIND:-0.0.0.0}:${ALBIA_PORT:-8090}:${ALBIA_PORT:-8090}"
    volumes:
      - ${SERVER_DATA_ROOT:-.}/ssh:/opt/albia/ssh:ro
      - ${SERVER_DATA_ROOT:-.}/albia/registry:/opt/albia/registry
    networks:
      - default
      - shared-network
    restart: unless-stopped

  dnsmasq:
    build:
      context: ./dnsmasq
      dockerfile: Dockerfile
    image: server-dnsmasq:latest
    container_name: server-dnsmasq
    network_mode: "${PXE_NETWORK_MODE:-host}"
    cap_add:
      - NET_ADMIN
    environment:
      PXE_DHCP_RANGE: "${PXE_DHCP_RANGE:-192.168.1.200,192.168.1.240,12h}"
      PXE_DNS: "${PXE_DNS:-1.1.1.1}"
      PXE_HTTP_PORT: "${PXE_HTTP_PORT:-8088}"
      PXE_INTERFACE: "${PXE_INTERFACE:-}"
      PXE_ROUTER: "${PXE_ROUTER:-192.168.1.1}"
      PXE_SERVER_IP: "${PXE_SERVER_IP:?Set PXE_SERVER_IP to the LAN IP of this Docker host}"
    volumes:
      - ${SERVER_DATA_ROOT:-.}/tftp:/srv/tftp:ro
    restart: unless-stopped

  render:
    image: nginx:1.27-alpine
    container_name: server-render
    entrypoint: ["/bin/sh", "/render.sh"]
    restart: "no"
    environment:
      PXE_SERVER_IP: "${PXE_SERVER_IP:?Set PXE_SERVER_IP to the LAN IP of this Docker host}"
      PXE_HTTP_PORT: "${PXE_HTTP_PORT:-8088}"
      ALBIA_PORT: "${ALBIA_PORT:-8090}"
    volumes:
      - ./render/render.sh:/render.sh:ro
      - ./www:/render/src:ro
      - ${SERVER_DATA_ROOT:-.}/www:/render/dst
      - ${SERVER_DATA_ROOT:-.}/ssh:/render/ssh:ro

  nginx:
    image: nginx:1.27-alpine
    container_name: server-nginx
    depends_on:
      render:
        condition: service_completed_successfully
    ports:
      - "${PXE_HTTP_BIND:-0.0.0.0}:${PXE_HTTP_PORT:-8088}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SERVER_DATA_ROOT:-.}/www:/srv/www:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # TFTP standalone (для сценария «роутер раздаёт DHCP-опции 66/67, dnsmasq
  # не нужен»). ВНИМАНИЕ: на Windows/Docker Desktop проброс 69/udp НЕ работает
  # (проверено: листенер не поднимается, TFTP-ответ с эфемерного порта режется
  # прокси) — профиль включать только на Linux-хосте. На Windows сетевая
  # загрузка без флешки — через UEFI HTTP Boot (см. runbook).
  tftpd:
    build:
      context: ./tftpd
      dockerfile: Dockerfile
    image: server-tftpd:latest
    container_name: server-tftpd
    profiles:
      - tftp
    ports:
      - "${PXE_TFTP_BIND:-0.0.0.0}:69:69/udp"
    volumes:
      - ${SERVER_DATA_ROOT:-.}/tftp:/srv/tftp:ro
    restart: unless-stopped

  registry:
    image: registry:2
    container_name: server-registry
    profiles:
      - registry
    ports:
      - "${REGISTRY_BIND:-0.0.0.0}:${REGISTRY_PORT:-5000}:5000"
    volumes:
      - ${SERVER_DATA_ROOT:-.}/registry:/var/lib/registry
    restart: unless-stopped

  netbootxyz:
    image: lscr.io/linuxserver/netbootxyz:latest
    container_name: server-netbootxyz
    profiles:
      - netbootxyz
    environment:
      PUID: "${NETBOOTXYZ_PUID:-1000}"
      PGID: "${NETBOOTXYZ_PGID:-1000}"
      TZ: "${TZ:-Europe/Moscow}"
    ports:
      - "${NETBOOTXYZ_WEB_BIND:-0.0.0.0}:${NETBOOTXYZ_WEB_PORT:-3000}:3000"
      - "${NETBOOTXYZ_ASSETS_BIND:-0.0.0.0}:${NETBOOTXYZ_ASSETS_PORT:-8089}:80"
      - "${NETBOOTXYZ_TFTP_BIND:-0.0.0.0}:${NETBOOTXYZ_TFTP_PORT:-6969}:69/udp"
    volumes:
      - ${SERVER_DATA_ROOT:-.}/data/netbootxyz/config:/config
      - ${SERVER_DATA_ROOT:-.}/data/netbootxyz/assets:/assets
    restart: unless-stopped

networks:
  shared-network:
    name: shared-network
    external: true
