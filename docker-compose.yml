services:
  orchestrator-service:
    build:
      # Контекст — корень репозитория: образ собирает React-фронтенд из src/
      # и кладёт его в backend (см. orchestrator-service/Dockerfile).
      context: .
      dockerfile: orchestrator-service/Dockerfile
    image: orchestrator-service:latest
    container_name: orchestrator-service
    ports:
      - "4186:80"
    environment:
      # Общая точка входа в БД. По умолчанию — Postgres на shared-network
      # (infra-postgres-1:5432). Если в окружении есть PgBouncer -> HAProxy ->
      # Patroni leader, переопределите PGHOST/PGPORT через .env (pgbouncer:6432).
      PGHOST: "${PGHOST:-infra-postgres-1}"
      PGPORT: "${PGPORT:-5432}"
      PGUSER: "${PGUSER:-postgres}"
      # Не храните секреты в репозитории: задайте PGPASSWORD в .env или окружении.
      PGPASSWORD: "${PGPASSWORD:-postgres}"
      PGDATABASE: orchestrator_db
      AUTO_INIT: "true"
      # Фоновый runner продвигает автоматические роли по БД (false — выключить).
      RUNNER_ENABLED: "true"
      RUNNER_INTERVAL_MS: "3000"
      # Таймаут захвата РАССУЖДАЮЩЕЙ роли: прогон без завершения дольше порога →
      # TIMEOUT, слот свободен. 3 мин (INCIDENT-FIX 2026-06-28): полезная работа
      # рассуждающей роли = СЕКУНДЫ (Architect 34с, Reviewer 16с), поэтому при сбое
      # движка/раннера застрявший захват освобождается за 3 мин, а не за 30 — иначе
      # один аутаж копит часы простоя. Ложные TIMEOUT от скачков часов Docker-VM
      # гасит clockGuard (см. patroni-single-node-flapping, clock-guard-timeout-skew).
      # ВНИМАНИЕ: программист НЕ наследует это значение — см. RUNNER_CLAUDE_TIMEOUT_MS.
      RUNNER_ROLE_TIMEOUT_MS: "${RUNNER_ROLE_TIMEOUT_MS:-180000}"
      # Таймаут захвата ПРОГРАММИСТА (claude_programmer/CODING) — отдельно от
      # рассуждающих ролей: CODING идёт 10–20 мин, поэтому НЕ наследует короткий
      # RUNNER_ROLE_TIMEOUT_MS (иначе claude-захват реапится посреди написания кода).
      RUNNER_CLAUDE_TIMEOUT_MS: "${RUNNER_CLAUDE_TIMEOUT_MS:-1500000}"
      # Задайте токен, чтобы закрыть /api/* при сетевом доступе (пусто = выключено).
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
      # Микросервис инструментов (builtin-чтение проекта + MCP для Claude Code).
      TOOLS_SERVICE_URL: "http://tools-service:4188"
      # PROJECT-PATH-MAP-001: трансляция host root_path → путь внутри tools-service.
      # root_path в БД — путь хоста (Windows), а tools-service монтирует родитель
      # проектов в /projects. Префикс берём из PROJECTS_HOST_ROOT (.env).
      TOOLS_PROJECT_PATH_MAP: "${PROJECTS_HOST_ROOT:-K:\\Роботы\\Golang\\git}=>/projects"
      # Задачи ставит Codex чётко → роли не тратят много токенов на вывод.
      # Меньше max_tokens = быстрее генерация и ниже нагрузка на провайдера.
      CONNECTOR_LLM_MAX_TOKENS: "${CONNECTOR_LLM_MAX_TOKENS:-2048}"
      # CONNECTOR-LIMITER-001: глобальный адаптивный лимитер вызовов DeepSeek.
      # Старт с 6 одновременных, нащупывает потолок (AIMD) до MAX, при троттлинге
      # откатывается до MIN. TPM_BUDGET>0 включает мягкий гейт по токенам/мин.
      CONNECTOR_LIMIT_START: "${CONNECTOR_LIMIT_START:-6}"
      CONNECTOR_LIMIT_MIN: "${CONNECTOR_LIMIT_MIN:-2}"
      CONNECTOR_LIMIT_MAX: "${CONNECTOR_LIMIT_MAX:-32}"
      CONNECTOR_LIMIT_PROBE_AFTER: "${CONNECTOR_LIMIT_PROBE_AFTER:-15}"
      CONNECTOR_TPM_BUDGET: "${CONNECTOR_TPM_BUDGET:-0}"
      CONNECTOR_RETRY_MAX: "${CONNECTOR_RETRY_MAX:-1}"
    networks:
      - default
      - shared-network
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1, а не localhost: в alpine localhost резолвится в IPv6 ::1,
      # а сервер слушает IPv4 0.0.0.0 — иначе healthcheck даёт Connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  tools-service:
    build:
      context: .
      dockerfile: tools-service/Dockerfile
    image: tools-service:latest
    container_name: tools-service
    ports:
      # Публикуем 4188 на хост, чтобы локальный MCP-клиент (Claude Code/VS Code
      # через .mcp.json) мог обращаться к builtin-инструментам tools-service.
      - "4188:4188"
    environment:
      TOOLS_SERVICE_PORT: "4188"
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
    volumes:
      # Корни проектов для builtin-инструментов. Проект ai-dev-manager имеет
      # root_path "ai-dev-manager" → внутри контейнера он резолвится в
      # /app/ai-dev-manager (WORKDIR /app). rw — чтобы работали write/edit/delete
      # (для read-only ролей запись недоступна по уровню доступа).
      - ./:/app/ai-dev-manager:rw
      # PROJECT-PATH-MAP-001: родитель ВСЕХ проектов (PS, ai-dev-manager, …) на
      # /projects. Оркестратор транслирует host root_path в этот путь (см.
      # TOOLS_PROJECT_PATH_MAP), иначе роли не могут читать чужие проекты и валят
      # задачу в BLOCKED. «../» от каталога compose = родитель репозитория.
      - ../:/projects:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4188/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  mcp-service:
    build:
      context: ./mcp-service
      dockerfile: Dockerfile
    image: mcp-service:latest
    container_name: mcp-service
    ports:
      # HTTP/SSE-режим MCP: health на /health и Streamable MCP на /mcp.
      - "4190:4190"
    environment:
      MCP_SERVICE_PORT: "4190"
      # PROJECT_ROOT — это корень, который mcp-service ПЕРЕДАЁТ в tools-service как
      # `root`; tools-service резолвит его в своём контейнере (mount ./:/app/ai-dev-manager).
      # Поэтому путь должен совпадать с тем, что видит tools-service, а не mcp-service.
      PROJECT_ROOT: "/app/ai-dev-manager"
      # orchestrator-service внутри сети слушает порт 80 (ports 4186:80).
      ORCHESTRATOR_URL: "http://orchestrator-service"
      TOOLS_SERVICE_URL: "http://tools-service:4188"
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
      # Dev-режим: разрешаем запись/удаление/мутации оркестратора.
      MCP_ENABLE_WRITE: "1"
      MCP_ENABLE_DELETE: "1"
      MCP_ENABLE_ORCHESTRATOR_MUTATIONS: "1"
    volumes:
      # Зарезервировано на будущее (прямой доступ к файлам). Сейчас файловые
      # операции выполняет tools-service; путь совпадает с его mount.
      - ./:/app/ai-dev-manager:ro
    depends_on:
      orchestrator-service:
        condition: service_healthy
      tools-service:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4190/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  scanner-service:
    build:
      context: .
      dockerfile: scanner-service/Dockerfile
    image: scanner-service:latest
    container_name: scanner-service
    environment:
      # API multi-watcher режим: папки наблюдения берутся из этапов проектов
      # оркестратора (SCANNER_API_BASE). Legacy single-watcher/feeder удалён.
      SCANNER_API_BASE: http://orchestrator-service
      # Каталог exactly-once state-файлов watcher'ов (по projectId+stageId).
      SCANNER_STATE_DIR: /workspace/scanner-state
      SCANNER_DEBOUNCE_MS: "150"
      # bind-mount в Docker не пробрасывает события fs.watch с хоста —
      # резервный опрос ловит изменения, которые watcher пропустил.
      SCANNER_FALLBACK_MS: "5000"
      # Stage 1: после доставки удалять завершённую запись, освобождая слот.
      SCANNER_CLEAR_ON_DISPATCH: "true"
      # Интейк (SCANNER-INTAKE-001): импорт задач из Markdown-очередей
      # tasks/<service>.md (секции с маркером `[x]`) в БД с вырезанием секции.
      # Включается заданием проекта-владельца; папка очередей — /workspace.
      # Значение — code|name|root_path проекта (root_path стабильнее всего).
      SCANNER_INTAKE_PROJECT: "${SCANNER_INTAKE_PROJECT:-ai-dev-manager}"
      SCANNER_INTAKE_DIR: /workspace
      SCANNER_INTAKE_INTERVAL_MS: "5000"
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
    volumes:
      # Эталонная папка задач проекта: Markdown-очереди интейка (tasks/<service>.md)
      # и каталог state-файлов сканера. Одна папка — один источник истины.
      - ./tasks:/workspace
    depends_on:
      orchestrator-service:
        condition: service_healthy
    restart: unless-stopped

networks:
  shared-network:
    name: shared-network
    external: true
