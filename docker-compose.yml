services:
  orchestrator-service:
    build:
      # Контекст — корень репозитория: образ собирает React-фронтенд из src/
      # и кладёт его в backend (см. orchestrator-service/Dockerfile).
      context: .
      dockerfile: orchestrator-service/Dockerfile
    image: orchestrator-service:latest
    container_name: orchestrator-service
    ports:
      - "4186:80"
    environment:
      # Общая точка входа в БД. По умолчанию — Postgres на shared-network
      # (infra-postgres-1:5432). Если в окружении есть PgBouncer -> HAProxy ->
      # Patroni leader, переопределите PGHOST/PGPORT через .env (pgbouncer:6432).
      PGHOST: "${PGHOST:-infra-postgres-1}"
      PGPORT: "${PGPORT:-5432}"
      PGUSER: "${PGUSER:-postgres}"
      # Не храните секреты в репозитории: задайте PGPASSWORD в .env или окружении.
      PGPASSWORD: "${PGPASSWORD:-postgres}"
      PGDATABASE: orchestrator_db
      AUTO_INIT: "true"
      # Фоновый runner продвигает автоматические роли по БД (false — выключить).
      RUNNER_ENABLED: "true"
      RUNNER_INTERVAL_MS: "3000"
      # Задайте токен, чтобы закрыть /api/* при сетевом доступе (пусто = выключено).
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
      # Микросервис инструментов (builtin-чтение проекта + MCP для Claude Code).
      TOOLS_SERVICE_URL: "http://tools-service:4188"
    networks:
      - default
      - shared-network
    restart: unless-stopped
    healthcheck:
      # 127.0.0.1, а не localhost: в alpine localhost резолвится в IPv6 ::1,
      # а сервер слушает IPv4 0.0.0.0 — иначе healthcheck даёт Connection refused.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  tools-service:
    build:
      context: .
      dockerfile: tools-service/Dockerfile
    image: tools-service:latest
    container_name: tools-service
    ports:
      # Публикуем 4188 на хост, чтобы локальный MCP-клиент (Claude Code/VS Code
      # через .mcp.json) мог обращаться к builtin-инструментам tools-service.
      - "4188:4188"
    environment:
      TOOLS_SERVICE_PORT: "4188"
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
    volumes:
      # Корни проектов для builtin-инструментов. Проект ai-dev-manager имеет
      # root_path "ai-dev-manager" → внутри контейнера он резолвится в
      # /app/ai-dev-manager (WORKDIR /app). rw — чтобы работали write/edit/delete
      # (для read-only ролей запись недоступна по уровню доступа).
      - ./:/app/ai-dev-manager:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4188/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  mcp-service:
    build:
      context: ./mcp-service
      dockerfile: Dockerfile
    image: mcp-service:latest
    container_name: mcp-service
    ports:
      # HTTP/SSE-режим MCP: health на /health и Streamable MCP на /mcp.
      - "4190:4190"
    environment:
      MCP_SERVICE_PORT: "4190"
      # PROJECT_ROOT — это корень, который mcp-service ПЕРЕДАЁТ в tools-service как
      # `root`; tools-service резолвит его в своём контейнере (mount ./:/app/ai-dev-manager).
      # Поэтому путь должен совпадать с тем, что видит tools-service, а не mcp-service.
      PROJECT_ROOT: "/app/ai-dev-manager"
      # orchestrator-service внутри сети слушает порт 80 (ports 4186:80).
      ORCHESTRATOR_URL: "http://orchestrator-service"
      TOOLS_SERVICE_URL: "http://tools-service:4188"
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
      # Dev-режим: разрешаем запись/удаление/мутации оркестратора.
      MCP_ENABLE_WRITE: "1"
      MCP_ENABLE_DELETE: "1"
      MCP_ENABLE_ORCHESTRATOR_MUTATIONS: "1"
    volumes:
      # Зарезервировано на будущее (прямой доступ к файлам). Сейчас файловые
      # операции выполняет tools-service; путь совпадает с его mount.
      - ./:/app/ai-dev-manager:ro
    depends_on:
      orchestrator-service:
        condition: service_healthy
      tools-service:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4190/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  scanner-service:
    build:
      context: .
      dockerfile: scanner-service/Dockerfile
    image: scanner-service:latest
    container_name: scanner-service
    environment:
      SCANNER_DOCUMENT: /workspace/claude-tasks.json
      SCANNER_STATE: /workspace/.scanner-state.json
      SCANNER_ENDPOINT: http://orchestrator-service/api/scanner/task-completed
      SCANNER_DEBOUNCE_MS: "150"
      # bind-mount в Docker не пробрасывает события fs.watch с хоста —
      # резервный опрос ловит изменения, которые watcher пропустил.
      SCANNER_FALLBACK_MS: "5000"
      # Stage 1: после доставки удалять завершённую запись, освобождая слот.
      SCANNER_CLEAR_ON_DISPATCH: "true"
      # Stage 2: обратный мост — наполнять пустой слот следующей задачей из БД.
      FEEDER_ENABLED: "true"
      FEEDER_INTERVAL_MS: "3000"
      # Интейк (SCANNER-INTAKE-001): импорт задач из Markdown-очередей
      # tasks/<service>.md (секции с маркером `[x]`) в БД с вырезанием секции.
      # Включается заданием проекта-владельца; папка задач — каталог /workspace.
      # Значение — code|name|root_path проекта (root_path стабильнее всего).
      SCANNER_INTAKE_PROJECT: "${SCANNER_INTAKE_PROJECT:-ai-dev-manager}"
      SCANNER_INTAKE_INTERVAL_MS: "5000"
      ORCHESTRATOR_API_TOKEN: "${ORCHESTRATOR_API_TOKEN:-}"
    volumes:
      # Единая эталонная папка задач проекта. Файл-мост claude-tasks.json и
      # state-файл сканера лежат прямо в tasks/, чтобы не «бегать» по проекту:
      # одна папка — один источник истины для очереди и слота Programmer.
      - ./tasks:/workspace
    depends_on:
      orchestrator-service:
        condition: service_healthy
    restart: unless-stopped

networks:
  shared-network:
    name: shared-network
    external: true
